<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Феечки СКУФинкс</title>
    <style>
        body { margin: 0; background: #fff176; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        /* Экраны */
        .screen { display: none; height: 100%; width: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        .active { display: flex; }

        /* Стили логотипа */
        .title { font-size: 3rem; font-weight: 800; background: linear-gradient(90deg, #2e7d32, #fbc02d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; margin-bottom: 30px; }
        @keyframes shine { to { background-position: 200% center; } }

        /* Стиль кнопок */
        button { padding: 20px 40px; margin: 10px; border-radius: 25px; border: none; font-size: 1.2rem; cursor: pointer; color: white; font-weight: bold; width: 250px; }
        .btn-play { background: #ba1a1a; }
        .btn-settings { background: #74777f; }

        /* Игровая сцена */
        .floor { position: absolute; bottom: 0; width: 100%; height: 30%; background: #5d4037; }
        .sofa { position: absolute; bottom: 25%; left: 5%; width: 350px; height: 120px; background: #4e342e; border-radius: 20px; }
        .char-container { position: absolute; bottom: 25%; left: 10%; width: 120px; height: 250px; }
        .body { width: 120px; height: 180px; background: blue; border-radius: 50% 50% 20% 20%; position: absolute; bottom: 0; }
        .head { width: 70px; height: 70px; background: #ffccbc; border-radius: 50%; position: absolute; top: 0; left: 25px; }
        #beer-img { position: absolute; bottom: 35%; left: 20%; width: 80px; z-index: 5; transition: opacity 0.5s; }
    </style>
</head>
<body>

<div id="menu" class="screen active">
    <div class="title">Феечки СКУФинкс</div>
    <button class="btn-play" onclick="showScreen('game')">Играть</button>
    <button class="btn-settings" onclick="showScreen('settings')">Настройки</button>
</div>

<div id="settings" class="screen">
    <h2>Настройки</h2>
    <input type="range" id="l-range" min="1" max="20" value="5">
    <button class="btn-settings" onclick="showScreen('menu')">Назад</button>
</div>

<div id="game" class="screen">
    <button style="position:absolute; top:20px; left:20px; width: 100px;" onclick="location.reload()">Меню</button>
    <div class="floor"></div>
    <div class="sofa"></div>
    <div class="char-container">
        <div class="head"></div>
        <div class="body"></div>
    </div>
    <img id="beer-img" src="i (9).jpeg" alt="пиво">
</div>

<script>
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
