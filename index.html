<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Феечки СКУФинкс</title>
    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: sans-serif; background: #fff176; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; }
        .active { display: flex; }

        /* Заголовок с переливом */
        .title { font-size: 3rem; font-weight: 900; background: linear-gradient(90deg, #2e7d32, #fbc02d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }

        /* Кнопки */
        button { padding: 15px 40px; margin: 10px; border-radius: 20px; border: none; font-size: 1.2rem; cursor: pointer; color: white; }
        .btn-play { background: #ba1a1a; }
        .btn-settings { background: #74777f; }

        /* Игровая зона */
        .game-view { background: #fff176; width: 100%; height: 100%; position: relative; }
        .floor { position: absolute; bottom: 0; width: 100%; height: 30%; background: #5d4037; }
        .sofa { position: absolute; bottom: 25%; left: 5%; width: 350px; height: 120px; background: #4e342e; border-radius: 20px; }
        
        /* Персонаж */
        .char-body { position: absolute; bottom: 35%; left: 15%; width: 120px; height: 180px; background: blue; border-radius: 50% 50% 20% 20%; z-index: 2; }
        .char-head { position: absolute; bottom: 65%; left: 18%; width: 70px; height: 70px; background: #ffccbc; border-radius: 50%; z-index: 3; }
        
        /* Пиво */
        #beer-img { position: absolute; bottom: 40%; left: 25%; width: 120px; height: auto; z-index: 4; transition: height 0.3s; }
    </style>
</head>
<body>

<div id="menu" class="screen active">
    <div class="title">Феечки СКУФинкс</div>
    <button class="btn-play" onclick="showGame()">Играть</button>
    <button class="btn-settings" onclick="alert('Литры: 1-20L')">Настройки</button>
</div>

<div id="game" class="screen">
    <button style="position:absolute; top:10px; left:10px; z-index:10;" onclick="location.reload()">Меню</button>
    <div class="game-view">
        <div class="floor"></div>
        <div class="sofa"></div>
        <div class="char-body"></div>
        <div class="char-head"></div>
        <img id="beer-img" src="i (9).jpeg" alt="пиво">
    </div>
</div>

<script>
    function showGame() {
        document.getElementById('menu').classList.remove('active');
        document.getElementById('game').classList.add('active');
        
        const img = document.getElementById('beer-img');
        let h = 200;
        
        setInterval(() => {
            if(h > 0) {
                h -= 2;
                img.style.height = h + "px";
            }
        }, 200);
    }
</script>
</body>
</html>
